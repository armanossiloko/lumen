services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumen}
      POSTGRES_DB: ${POSTGRES_DB:-lumen}
    volumes:
      - lumen_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-lumen};
        Username=${POSTGRES_USER:-lumen};Password=${POSTGRES_PASSWORD:-lumen}
      Jwt__Key: ${JWT_KEY:-lumen-docker-signing-key-change-me-32b}
      Authentication__FrontendCallbackUrl: ${FRONTEND_URL:-http://localhost:6000}/auth/callback
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${BACKEND_PORT:-6002}:8080'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-6000}:80'

volumes:
  lumen_pg_data:
