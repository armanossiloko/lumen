<div [class]="'app theme-' + state.tweaks().theme + ' width-' + state.tweaks().pageWidth">
  @if (state.loading()) {
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <p>Loading...</p>
    </div>
  } @else if (state.error()) {
    <app-offline-screen (retry)="retryConnection()" />
  } @else {
    <app-sidebar
      [tree]="state.tree()"
      [pageIds]="allPageIds()"
      [pageTitles]="pageTitleById()"
      [currentId]="state.currentId()"
      [unreadCount]="state.unreadCount()"
      [workspaces]="state.workspaces()"
      [currentWorkspace]="currentWorkspace()"
      [expandHintId]="state.sidebarExpandHint()"
      [favoritePages]="state.favoritePages()"
      [recentPages]="recentPageList()"
      (onSelect)="handleSelectPage($event)"
      (onTreeChange)="state.persistTreeChange($event)"
      (treeReorder)="state.reorderTree($event.dragId, $event.targetId)"
      (onOpenSearch)="state.showCmd.set(true)"
      (onOpenInbox)="state.showInbox.set(true)"
      (onOpenCreatePage)="state.openCreatePage($event.parentId, $event.parentTitle)"
      (onOpenCreateFolder)="state.openCreateFolder($event.parentId, $event.parentTitle)"
      (renamePageConfirm)="state.renamePageFromSidebar($event)"
      (workspaceChange)="handleWorkspaceChange($event)"
      (workspaceCreate)="state.createWorkspace($event)"
      (changeIcon)="state.openIconEdit($event)"
    />

    <main class="main">
      <app-header
        [page]="currentPage()"
        [theme]="state.tweaks().theme"
        [unreadCount]="state.unreadCount()"
        [viewers]="viewers()"
        [people]="state.people()"
        [currentUser]="currentUser()"
        [crumbLinkIds]="crumbLinkIds()"
        [canGoBack]="state.canGoBack()"
        [canGoForward]="state.canGoForward()"
        (selectPage)="state.selectPage($event)"
        (goBack)="state.goBack()"
        (goForward)="state.goForward()"
        (themeChange)="state.setTweak('theme', $event)"
        (openSearch)="state.showCmd.set(true)"
        (share)="openShare()"
        (openInbox)="state.showInbox.set(true)"
        (signOut)="state.logout()"
      />

      <div class="main-body">
        <app-page-view
          [page]="currentPage()"
          [blocks]="currentPage().blocks"
          [comments]="state.comments()"
          [focusBlockIdx]="state.focusBlockIdx()"
          [reactions]="pageReactions()"
          [pageThread]="pageThread()"
          [pageWidth]="state.tweaks().pageWidth"
          [people]="state.people()"
          [currentUser]="currentUser()"
          [isFavorite]="state.isFavorite(state.currentId())"
          (onTitleChange)="handleTitleChange($event)"
          (onBlocksChange)="handleBlocksChange($event)"
          (onMarkdownBodySave)="state.saveCurrentPageMarkdownBody($event)"
          (onResolveComment)="state.resolveComment($event)"
          (onReplyComment)="state.replyComment($event.key, $event.text)"
          (onAddComment)="state.addComment($event)"
          (onFocusBlock)="state.focusBlockIdx.set($event)"
          (onReact)="state.addReaction($event)"
          (onAddPageComment)="state.addPageComment($event)"
          (onReplyPageComment)="state.replyPageComment($event.commentId, $event.text)"
          (onCommentReaction)="state.toggleCommentReaction($event.commentId, $event.emoji)"
          (onSelectPage)="state.selectPage($event)"
          (onIconChange)="state.updateCurrentPageIcon($event)"
          (onBlockReorder)="state.reorderCurrentPageBlocks($event.from, $event.to)"
          (onPageAction)="state.handlePageAction($event)"
        />

        <app-comments-panel
          [open]="state.showCommentsPanel() && Object.keys(pageThreadComments()).length > 0"
          [threads]="pageThreadComments()"
          [page]="currentPage()"
          [blockMap]="blockMap()"
          [people]="state.people()"
          (onClose)="state.showCommentsPanel.set(false)"
          (onResolve)="state.resolveComment($event)"
          (onReply)="state.replyComment($event.key, $event.text, $event.parentCommentId)"
          (onJump)="state.focusBlockIdx.set($event)"
          (onCommentReaction)="state.toggleCommentReaction($event.commentId, $event.emoji)"
          (onDelete)="state.deleteComment($event.commentId, $event.threadKey)"
        />
      </div>
    </main>

    <app-icon-edit-modal
      [ctx]="state.iconEditUi()"
      (cancel)="state.closeIconEdit()"
      (save)="state.saveIconEdit($event)"
    />

    <app-create-navigation-modal
      [ctx]="state.createNavUi()"
      (cancel)="state.closeCreateNav()"
      (confirmCreate)="state.confirmCreateNavigation($event)"
    />

    <app-command-palette
      [open]="state.showCmd()"
      [pages]="state.pages()"
      [movePageId]="state.movePageUi()"
      [tree]="state.tree()"
      (onClose)="state.showCmd.set(false); state.movePageUi.set(null)"
      (onSelect)="state.selectPage($event); state.showCmd.set(false)"
      (onMoveTarget)="state.movePageToParent(state.movePageUi()!, $event)"
      (onCreatePage)="handlePaletteCreate($event)"
      (onTodayNotes)="state.openTodayNotes(); state.showCmd.set(false)"
      (onBrowseTemplates)="state.openTemplates(); state.showCmd.set(false)"
    />

    <app-block-comment-modal
      [blockIdx]="state.blockCommentBlockIdx()"
      (cancel)="state.cancelBlockComment()"
      (submitComment)="state.submitBlockComment($event)"
    />

    <app-share-modal
      [open]="state.showShare()"
      [page]="currentPage()"
      [people]="state.people()"
      [members]="shareMembersDraft"
      [linkSharing]="shareLinkDraft"
      (membersChange)="shareMembersDraft = $event"
      (linkSharingChange)="shareLinkDraft = $event"
      (copyLink)="copyShareLink()"
      (save)="saveShare()"
      (onClose)="state.showShare.set(false)"
    />

    <app-inbox-panel
      [open]="state.showInbox()"
      [items]="state.inbox()"
      [people]="state.people()"
      (onClose)="state.showInbox.set(false)"
      (onMarkRead)="state.markInboxRead($event)"
      (onMarkAllRead)="state.markAllInboxRead()"
      (onJump)="state.selectPage($event); state.showInbox.set(false)"
    />

    <app-history-modal
      [open]="state.showHistory()"
      [entries]="state.pageHistory()"
      (onClose)="state.showHistory.set(false)"
      (restore)="state.restoreHistoryVersion(state.currentId(), $event)"
    />

    <app-backlinks-modal
      [open]="state.showBacklinks()"
      [links]="state.backlinks()"
      (onClose)="state.showBacklinks.set(false)"
      (openPage)="state.selectPage($event); state.showBacklinks.set(false)"
    />

    <app-trash-panel
      [open]="state.showTrash()"
      [pages]="state.trashPages()"
      (onClose)="state.showTrash.set(false)"
      (restore)="state.restoreFromTrash($event)"
    />

    <app-templates-modal
      [open]="state.showTemplates()"
      [templates]="state.templates()"
      (onClose)="state.showTemplates.set(false)"
      (select)="state.createFromTemplate($event)"
    />

    @if (!state.showCommentsPanel() && Object.keys(pageThreadComments()).length > 0) {
      <button class="cmt-fab" (click)="state.showCommentsPanel.set(true)" title="Show comments">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 4a2 2 0 012-2h6a2 2 0 012 2v5a2 2 0 01-2 2H7l-3 3V11H5a2 2 0 01-2-2V4z" stroke="currentColor" strokeWidth="1.3" fill="none"/></svg>
        <span>{{ getUnresolvedCommentCount() }}</span>
      </button>
    }
  }
</div>
